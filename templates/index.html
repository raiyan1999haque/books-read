<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Research Library</title>
    <style>
        :root { --paper: #fdfcf0; --ink: #2c3e50; --accent: #27ae60; --danger: #e74c3c; --shadow: rgba(0,0,0,0.1); }
        body { font-family: 'Georgia', serif; background: var(--paper); padding: 40px; color: var(--ink); line-height: 1.6; }
        .container { max-width: 1100px; margin: auto; }
        
        /* Form Styling */
        .add-book-box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px var(--shadow); margin-bottom: 50px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .full-width { grid-column: span 2; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 4px; width: 100%; box-sizing: border-box; font-size: 14px; }
        .file-label { font-size: 0.85em; font-weight: bold; margin-bottom: 5px; display: block; color: #7f8c8d; }
        
        button { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.2s; }
        button:hover { opacity: 0.9; }

        /* Shelf/Grid Styling */
        .shelf { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 30px; }
        .book-card { background: white; padding: 15px; border-radius: 5px; box-shadow: 0 2px 8px var(--shadow); text-align: center; display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s; }
        .book-card:hover { transform: translateY(-5px); }
        .book-card img { width: 100%; height: 320px; object-fit: cover; border-radius: 3px; margin-bottom: 12px; cursor: pointer; }
        .book-title { font-weight: bold; font-size: 1.1em; display: block; margin-bottom: 5px; color: var(--ink); }
        .book-author { color: #7f8c8d; font-size: 0.9em; font-style: italic; margin-bottom: 10px; }
        
        .delete-btn { background: none; color: var(--danger); border: 1px solid var(--danger); font-size: 11px; padding: 5px; width: auto; margin: auto; border-radius: 3px; }
        .delete-btn:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Research Library</h1>
    
    <div class="add-book-box">
        <h3>Catalog New Book</h3>
        <form action="/add_book" method="post" enctype="multipart/form-data">
            <div class="form-grid">
                <input type="text" name="title" placeholder="Book Title" class="full-width" required>
                <input type="text" name="authors" placeholder="Author(s)" required>
                <input type="text" name="edition" placeholder="Edition (e.g., 3rd Ed.)">
                <input type="text" name="publisher" placeholder="Publisher">
                <input type="text" name="pub_year" placeholder="Year">
                <div class="full-width">
                    <label class="file-label">Upload Cover Photo:</label>
                    <input type="file" name="cover_file" accept="image/*">
                </div>
            </div>
            <button type="submit">Add to Collection</button>
        </form>
    </div>

    <div class="shelf">
        {% for book in books %}
        <div class="book-card">
            <div onclick="window.location.href='/book/{{ book.id }}'">
                {% if book.cover_url %}
                    <img src="{{ book.cover_url }}" alt="Cover">
                {% else %}
                    <div style="height:320px; background:#f0f0f0; display:flex; align-items:center; justify-content:center; color:#ccc;">No Cover</div>
                {% endif %}
                <span class="book-title">{{ book.title }}</span>
                <span class="book-author">{{ book.authors }}</span>
            </div>
            
            <form action="/delete_book/{{ book.id }}" method="post" onsubmit="return confirm('Delete this book and all its notes?');">
                <button type="submit" class="delete-btn">Remove Book</button>
            </form>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
